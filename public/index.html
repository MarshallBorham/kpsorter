<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Basketball Player Finder - Transfer Portal Analysis Tool">
  <title>Login - Basketball Player Finder</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="test.mjs"></script>
</head>
<body>
  <main class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title"> Basketball Player Finder</h1>
        <p class="login-subtitle">Transfer Portal Analysis Tool</p>
      </div>
      
      <form class="login-form" action="home.html">
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            placeholder="Enter your email"
            required
            aria-required="true"
          >
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="Enter your password"
            required
            aria-required="true"
          >
        </div>
        
        <button type="submit" class="btn btn-primary">Login</button>
        
        <p class="link-text">
          Don't have an account? 
          <a href="home.html">Register Here</a>
        </p>
      </form>
    </div>
  </main>
</body>
</html>
