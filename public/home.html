<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Find top transfer portal players by combining stats">
  <title>Find Players - Basketball Player Finder</title>
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="header.mjs"></script>
  <script type="module" src="contact.mjs"></script>
</head>
<body>

  <main class="container">
    <section class="hero-section">
      <h1 class="page-title">Find Top Transfer Portal Players</h1>
      <p class="page-subtitle">
        Discover players who excel in multiple statistical categories to make informed recruitment decisions
      </p>
    </section>

    <section class="search-form">
      <form action="results.html">
        <div class="form-grid">
          <div class="form-group">
            <label for="stat1" class="form-label">Select First Stat</label>
            <select id="stat1" name="stat1" class="form-select" aria-required="true">
              <option value="">Choose a stat...</option>
              <option value="efg" selected>eFG% (Effective Field Goal)</option>
              <option value="ortg">ORtg (Offensive Rating)</option>
              <option value="ts">TS% (True Shooting)</option>
              <option value="arate">ARate (Assist Rate)</option>
              <option value="stl">Stl% (Steal Percentage)</option>
              <option value="blk">Blk% (Block Percentage)</option>
              <option value="or">OR% (Offensive Rebound)</option>
              <option value="dr">DR% (Defensive Rebound)</option>
              <option value="to">TO% (Turnover Rate)</option>
              <option value="ftrate">FTRate (Free Throw Rate)</option>
              <option value="2p">2P% (Two-Point Percentage)</option>
              <option value="3p">3P% (Three-Point Percentage)</option>
              <option value="ft">FT% (Free Throw Percentage)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="stat2" class="form-label">Select Second Stat</label>
            <select id="stat2" name="stat2" class="form-select" aria-required="true">
              <option value="">Choose a stat...</option>
              <option value="efg">eFG% (Effective Field Goal)</option>
              <option value="ortg">ORtg (Offensive Rating)</option>
              <option value="ts">TS% (True Shooting)</option>
              <option value="arate" selected>ARate (Assist Rate)</option>
              <option value="stl">Stl% (Steal Percentage)</option>
              <option value="blk">Blk% (Block Percentage)</option>
              <option value="or">OR% (Offensive Rebound)</option>
              <option value="dr">DR% (Defensive Rebound)</option>
              <option value="to">TO% (Turnover Rate)</option>
              <option value="ftrate">FTRate (Free Throw Rate)</option>
              <option value="2p">2P% (Two-Point Percentage)</option>
              <option value="3p">3P% (Three-Point Percentage)</option>
              <option value="ft">FT% (Free Throw Percentage)</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">Find Players</button>
      </form>
    </section>
    <section class="contact-section">
      <h2>Contact Me</h2>
      <form class="contact-form">

      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-input"
          placeholder="you@example.com"
          required
        />
      </div>

      <fieldset class="form-group">
        <legend>What best describes you? (select at least one)</legend>
        <label>
          <input type="checkbox" name="role" value="employer" required />
          Employer
        </label>
        <label>
          <input type="checkbox" name="role" value="peer" />
          Peer
        </label>
        <label>
          <input type="checkbox" name="role" value="other" />
          Other
        </label>
      </fieldset>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea 
          id="message" 
          name="message" 
          class="form-input"
          rows="5"
          placeholder="Write your message here..."
        ></textarea>
      </div>

      <input type="submit" value="Send Message" class="btn btn-primary" />

    </form>
  </section>
  </main>
</body>
</html>
